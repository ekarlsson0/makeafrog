<html>
<head>
  <title>makea.frog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
    }
    canvas {
      border: 3px solid #4a9d5f;
      display: block;
      margin: 20px auto;
      background: linear-gradient(to bottom, #87ceeb 0%, #b8e0d2 100%);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #4a9d5f;
      color: #ffffff;
      border: 2px solid #2d5a3d;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    button:hover {
      background-color: #5dbd75;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    h1 {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2.5em;
      margin: 10px 0;
    }
    p {
      font-size: 1.1em;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🐸 makea.frog 🐸</h1>
  <p>Every refresh creates a unique frog. Click the button to generate a new one!</p>
  <canvas id="frogCanvas" width="700" height="500"></canvas>
  <br>
  <button onclick="drawRandomFrog()">Generate New Frog</button>

  <script>
    const canvas = document.getElementById('frogCanvas');
    const ctx = canvas.getContext('2d');

    const bodyColors = [
      '#2ecc71', '#27ae60', '#16a085', '#1abc9c', '#52be80',
      '#1e8449', '#28b463', '#17a589', '#0e6251', '#229954',
      '#239b56', '#186a3b', '#145a32', '#0b5345', '#1d5f3f',
      '#3d9970', '#52c996', '#45b393'
    ];

    const bellyColors = [
      '#a9dfbf', '#b5e7a0', '#abebc6', '#c8e6c9', '#b2dfdb',
      '#80c788', '#99d695', '#90ee90', '#98d98e', '#9cd89e'
    ];

    function getRandomColor(colorArray) {
      return colorArray[Math.floor(Math.random() * colorArray.length)];
    }

    function drawTriangle(x, y, size, angle) {
      // Draw an equilateral triangle pointing in direction of angle
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(-size * 0.866, size * 0.5);
      ctx.lineTo(size * 0.866, size * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawExpression(headY, headRadius, bumpDistance, expressionType, bodyColor) {
      const eyeRadius = headRadius * 0.25;
      const eyeY = headY - headRadius * 0.4;
      const pupilRadius = eyeRadius * 0.5;

      // Draw eye sockets (colored circles behind the eyes to make them pop)
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(-bumpDistance, eyeY, eyeRadius * 1.1, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(bumpDistance, eyeY, eyeRadius * 1.1, 0, Math.PI * 2);
      ctx.fill();

      if (expressionType === 0) {
        // Happy expression
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Happy smile
        const mouthY = headY + headRadius * 0.3;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, mouthY, 15, 0, Math.PI, false);
        ctx.stroke();

      } else if (expressionType === 1) {
        // Surprised/Shocked expression
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY - 5, eyeRadius * 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY - 5, pupilRadius * 0.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY - 5, eyeRadius * 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY - 5, pupilRadius * 0.8, 0, Math.PI * 2);
        ctx.fill();

        // Surprised O mouth
        const mouthY = headY + headRadius * 0.3;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, mouthY, 12, 0, Math.PI * 2);
        ctx.stroke();

      } else if (expressionType === 2) {
        // Sleepy/Tired expression
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(-bumpDistance, eyeY, eyeRadius, eyeRadius * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY, pupilRadius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.ellipse(bumpDistance, eyeY, eyeRadius, eyeRadius * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY, pupilRadius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // Sleepy line mouth
        const mouthY = headY + headRadius * 0.3;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-12, mouthY);
        ctx.lineTo(12, mouthY);
        ctx.stroke();

      } else if (expressionType === 3) {
        // Angry/Grumpy expression
        // Eyes slanted down
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY - 3, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(-bumpDistance - 2, eyeY - 3, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY - 3, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance + 2, eyeY - 3, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Angry eyebrows
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-bumpDistance - 12, eyeY - 12);
        ctx.lineTo(-bumpDistance + 12, eyeY - 8);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bumpDistance - 12, eyeY - 8);
        ctx.lineTo(bumpDistance + 12, eyeY - 12);
        ctx.stroke();

        // Frown
        const mouthY = headY + headRadius * 0.3;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, mouthY + 5, 15, Math.PI, 0, false);
        ctx.stroke();

      } else if (expressionType === 4) {
        // Winking expression
        // Left eye winking (closed)
        ctx.fillStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#000000';
        ctx.beginPath();
        ctx.moveTo(-bumpDistance - 10, eyeY);
        ctx.lineTo(-bumpDistance + 10, eyeY);
        ctx.stroke();

        // Right eye open
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance + (Math.random() - 0.5) * 4, eyeY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Playful smile
        const mouthY = headY + headRadius * 0.3;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, mouthY, 12, 0, Math.PI, false);
        ctx.stroke();

      } else if (expressionType === 5) {
        // Confused expression
        // Left eye looking left
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(-bumpDistance - 4, eyeY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Right eye looking right
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(bumpDistance + 4, eyeY, pupilRadius, 0, Math.PI * 2);
        ctx.fill();

        // Question mark mouth
        const mouthY = headY + headRadius * 0.35;
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, mouthY - 8, 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-2, mouthY);
        ctx.lineTo(2, mouthY);
        ctx.stroke();
      }
    }

    function drawFrog() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      // Random frog proportions - now wider body is possible
      const bodyScale = Math.random() * 0.5 + 0.8; // 0.8 - 1.3
      const bodyWidthScale = Math.random() * 0.6 + 0.7; // 0.7 - 1.3 for width variation
      const headScale = Math.random() * 0.4 + 0.8; // 0.8 - 1.2
      
      // Body dimensions
      const bodyWidth = 100 * bodyScale * bodyWidthScale;
      const bodyHeight = 130 * bodyScale;
      
      // Head dimensions
      const headRadius = 50 * headScale;
      
      // Colors
      const bodyColor = getRandomColor(bodyColors);
      const bellyColor = getRandomColor(bellyColors);
      const legColor = getRandomColor(bodyColors);
      const expressionType = Math.floor(Math.random() * 6);

      ctx.save();
      ctx.translate(centerX, centerY);

      // === BODY ===
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 30, bodyWidth, bodyHeight, 0, 0, Math.PI * 2);
      ctx.fill();

      // === BELLY SPOT (big spot on stomach) ===
      ctx.fillStyle = bellyColor;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, 35, bodyWidth * 0.5, bodyHeight * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // === BACK LEGS ===
      // Left back leg
      const backLegLength = Math.random() * 40 + 70;
      const backLegX = -bodyWidth * 0.65;
      const backLegY = bodyHeight * 0.8;
      const backLegAngle1 = Math.random() * 0.4 + 0.3;
      ctx.fillStyle = legColor;
      drawTriangle(backLegX, backLegY, backLegLength * 0.35, Math.PI / 2 + backLegAngle1);

      // Right back leg
      const backLegX2 = bodyWidth * 0.65;
      const backLegAngle2 = Math.random() * 0.4 + 0.3;
      ctx.fillStyle = legColor;
      drawTriangle(backLegX2, backLegY, backLegLength * 0.35, Math.PI / 2 - backLegAngle2);

      // === FRONT LEGS ===
      // Left front leg
      const frontLegLength = Math.random() * 30 + 40;
      const frontLegX = -bodyWidth * 0.7;
      const frontLegY = bodyHeight * 0.2;
      const frontLegAngle1 = Math.random() * 0.3 - 0.15;
      ctx.fillStyle = legColor;
      drawTriangle(frontLegX, frontLegY, frontLegLength * 0.3, -Math.PI / 2 + frontLegAngle1);

      // Right front leg
      const frontLegX2 = bodyWidth * 0.7;
      const frontLegAngle2 = Math.random() * 0.3 - 0.15;
      ctx.fillStyle = legColor;
      drawTriangle(frontLegX2, frontLegY, frontLegLength * 0.3, -Math.PI / 2 - frontLegAngle2);

      // === HEAD ===
      const headY = -bodyHeight * 0.6;
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
      ctx.fill();

      // === BUMPS ON TOP OF HEAD (where eyes sit) ===
      const bumpRadius = headRadius * 0.35;
      const bumpDistance = headRadius * 0.5;

      // Left bump
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(-bumpDistance, headY - headRadius * 0.4, bumpRadius, 0, Math.PI * 2);
      ctx.fill();

      // Right bump
      ctx.beginPath();
      ctx.arc(bumpDistance, headY - headRadius * 0.4, bumpRadius, 0, Math.PI * 2);
      ctx.fill();

      // === FACIAL EXPRESSION ===
      drawExpression(headY, headRadius, bumpDistance, expressionType, bodyColor);

      ctx.restore();
    }

    function drawRandomFrog() {
      drawFrog();
    }

    // Draw a random frog on page load
    window.addEventListener('load', drawRandomFrog);
  </script>
</body>
</html>
