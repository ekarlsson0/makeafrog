<html>
<head>
  <title>makea.fish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background-color: #0000FF;
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 1px solid white;
      display: block;
      margin: 20px auto;
      background-color: #000080;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #ffffff;
      color: #0000FF;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #cccccc;
    }
  </style>
</head>
<body>
  <h1>🐟 makea.fish 🐟</h1>
  <p>Welcome to makea.fish! Every refresh creates a unique fish.</p>
  <canvas id="fishCanvas" width="600" height="400"></canvas>
  <br>
  <button onclick="drawRandomFish()">Generate New Fish</button>

  <script>
    const canvas = document.getElementById('fishCanvas');
    const ctx = canvas.getContext('2d');

    function getRandomColor() {
      const colors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#52C9B2',
        '#FF7675', '#A29BFE', '#74B9FF', '#FF9FF3', '#54A0FF'
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function drawFish() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const fishX = canvas.width / 2;
      const fishY = canvas.height / 2;
      const bodySize = Math.random() * 60 + 40; // 40-100
      const color = getRandomColor();

      // Draw body (main oval)
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(fishX, fishY, bodySize * 1.2, bodySize * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Draw dorsal fin(s) - triangles
      const dorsalCount = Math.floor(Math.random() * 2) + 1;
      for (let i = 0; i < dorsalCount; i++) {
        const dorsalX = fishX - bodySize * 0.5 + (i * bodySize * 0.4);
        const dorsalY = fishY - bodySize * 0.8;
        const dorsalSize = Math.random() * 25 + 15;
        
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(dorsalX, dorsalY);
        ctx.lineTo(dorsalX - dorsalSize * 0.4, dorsalY - dorsalSize);
        ctx.lineTo(dorsalX + dorsalSize * 0.4, dorsalY - dorsalSize);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Draw tail fin (triangle)
      const tailSize = bodySize * (Math.random() * 0.6 + 0.5);
      const tailX = fishX + bodySize * 1.2;
      const tailY = fishY;
      
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(tailX + tailSize, tailY - tailSize * 0.8);
      ctx.lineTo(tailX + tailSize, tailY + tailSize * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Draw belly (lighter circle/oval)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.ellipse(fishX, fishY + bodySize * 0.3, bodySize * 0.8, bodySize * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Draw bottom fin (triangle)
      const bottomFinX = fishX - bodySize * 0.2;
      const bottomFinY = fishY + bodySize * 0.8;
      const bottomFinSize = Math.random() * 20 + 10;
      
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(bottomFinX, bottomFinY);
      ctx.lineTo(bottomFinX - bottomFinSize * 0.3, bottomFinY + bottomFinSize);
      ctx.lineTo(bottomFinX + bottomFinSize * 0.3, bottomFinY + bottomFinSize);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Draw eye (circle)
      const eyeX = fishX - bodySize * 0.5;
      const eyeY = fishY - bodySize * 0.3;
      ctx.fillStyle = '#000000';
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, bodySize * 0.15, 0, Math.PI * 2);
      ctx.fill();

      // Draw eye shine (small circle)
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(eyeX - bodySize * 0.05, eyeY - bodySize * 0.05, bodySize * 0.05, 0, Math.PI * 2);
      ctx.fill();

      // Draw gill (curved line or small arc)
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(fishX - bodySize * 0.3, fishY, bodySize * 0.3, Math.PI * 0.3, Math.PI * 0.7);
      ctx.stroke();
    }

    function drawRandomFish() {
      drawFish();
    }

    // Draw a random fish on page load
    window.addEventListener('load', drawRandomFish);
  </script>
</body>
</html>
