<html>
<head>
  <title>makea.frog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
    }
    canvas {
      border: 3px solid #4a9d5f;
      display: block;
      margin: 20px auto;
      background: linear-gradient(to bottom, #87ceeb 0%, #b8e0d2 100%);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #4a9d5f;
      color: #ffffff;
      border: 2px solid #2d5a3d;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    button:hover {
      background-color: #5dbd75;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    h1 {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2.5em;
      margin: 10px 0;
    }
    p {
      font-size: 1.1em;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🐸 makea.frog 🐸</h1>
  <p>Every refresh creates a unique frog. Click the button to generate a new one!</p>
  <canvas id="frogCanvas" width="700" height="500"></canvas>
  <br>
  <button onclick="drawRandomFrog()">Generate New Frog</button>

  <script>
    const canvas = document.getElementById('frogCanvas');
    const ctx = canvas.getContext('2d');

    // Expanded color palette
    const bodyColors = [
      '#2ecc71', '#27ae60', '#16a085', '#1abc9c', '#3498db',
      '#8e44ad', '#c0392b', '#e67e22', '#f39c12', '#f1c40f',
      '#52be80', '#1e8449', '#f39c12', '#d68910', '#7d3c98',
      '#16a085', '#0b5345', '#6c3483', '#28b463', '#7cb342'
    ];

    function getRandomColor() {
      return bodyColors[Math.floor(Math.random() * bodyColors.length)];
    }

    function getContrastColor(color) {
      // Return a darker version for details
      const factor = 0.6;
      const c = parseInt(color.slice(1), 16);
      const r = Math.floor((c >> 16) * factor);
      const g = Math.floor(((c >> 8) & 0xff) * factor);
      const b = Math.floor((c & 0xff) * factor);
      return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
    }

    function drawFrog() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const frogX = canvas.width / 2;
      const frogY = canvas.height / 2;

      // Randomize proportions drastically
      const bodyScale = Math.random() * 0.7 + 0.5; // 0.5 - 1.2
      const headScale = Math.random() * 0.8 + 0.6; // 0.6 - 1.4
      const legLength = Math.random() * 80 + 60; // 60 - 140
      const legThickness = Math.random() * 20 + 10; // 10 - 30

      // Random rotation for the whole frog
      const frogRotation = (Math.random() - 0.5) * 0.4; // -0.2 to 0.2 radians

      ctx.save();
      ctx.translate(frogX, frogY);
      ctx.rotate(frogRotation);

      // Color scheme for this frog
      const mainColor = getRandomColor();
      const accentColor = getRandomColor();
      const bellyColor = getRandomColor();
      const detailColor = getContrastColor(mainColor);

      // Draw body (main egg-shaped)
      const bodyWidth = 120 * bodyScale;
      const bodyHeight = 140 * bodyScale;
      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.ellipse(0, 20, bodyWidth, bodyHeight, 0, 0, Math.PI * 2);
      ctx.fill();

      // Draw belly (front oval)
      ctx.fillStyle = bellyColor;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, 30, bodyWidth * 0.6, bodyHeight * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Draw back legs (positioned farther out and lower)
      drawFrogLeg(
        -bodyWidth * 0.6,
        bodyHeight * 0.7,
        legLength * 1.3,
        legThickness * 1.2,
        accentColor,
        'back'
      );
      drawFrogLeg(
        bodyWidth * 0.6,
        bodyHeight * 0.7,
        legLength * 1.3,
        legThickness * 1.2,
        accentColor,
        'back'
      );

      // Draw front legs (positioned farther out)
      drawFrogLeg(
        -bodyWidth * 0.7,
        bodyHeight * 0.2,
        legLength * 0.8,
        legThickness * 0.9,
        accentColor,
        'front'
      );
      drawFrogLeg(
        bodyWidth * 0.7,
        bodyHeight * 0.2,
        legLength * 0.8,
        legThickness * 0.9,
        accentColor,
        'front'
      );

      // Draw head
      const headX = 0;
      const headY = -bodyHeight * 0.8;
      const headWidth = bodyWidth * headScale * 0.9;
      const headHeight = bodyHeight * headScale * 0.8;

      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.ellipse(headX, headY, headWidth, headHeight, 0, 0, Math.PI * 2);
      ctx.fill();

      // Random head rotation
      const headTilt = (Math.random() - 0.5) * 0.3;
      ctx.save();
      ctx.translate(headX, headY);
      ctx.rotate(headTilt);

      // Draw eyes (big, expressive, popping off the top of head)
      const eyeDistance = headWidth * 0.35;
      const eyeSize = Math.random() * 25 + 20; // 20 - 45

      // Left eye - positioned at top, popping off
      const leftEyeX = -eyeDistance;
      const leftEyeY = -headHeight * 0.65;
      drawEye(leftEyeX, leftEyeY, eyeSize, detailColor, mainColor);

      // Right eye - positioned at top, popping off
      const rightEyeX = eyeDistance;
      const rightEyeY = -headHeight * 0.65 + (Math.random() - 0.5) * 10;
      drawEye(rightEyeX, rightEyeY, eyeSize, detailColor, mainColor);

      ctx.restore();

      // Draw mouth (various expressions)
      const mouthType = Math.floor(Math.random() * 4);
      const mouthX = 0;
      const mouthY = headY + headHeight * 0.3;

      ctx.strokeStyle = detailColor;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';

      if (mouthType === 0) {
        // Happy smile
        ctx.beginPath();
        ctx.arc(mouthX, mouthY, 25, 0, Math.PI, false);
        ctx.stroke();
      } else if (mouthType === 1) {
        // Straight line
        ctx.beginPath();
        ctx.moveTo(mouthX - 20, mouthY);
        ctx.lineTo(mouthX + 20, mouthY);
        ctx.stroke();
      } else if (mouthType === 2) {
        // O shape
        ctx.beginPath();
        ctx.arc(mouthX, mouthY, 15, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // Smirk
        ctx.beginPath();
        ctx.arc(mouthX, mouthY, 20, 0.2, Math.PI - 0.2, false);
        ctx.stroke();
      }

      // Random spots/warts
      const spotCount = Math.floor(Math.random() * 6) + 2;
      ctx.fillStyle = detailColor;
      ctx.globalAlpha = 0.5;
      for (let i = 0; i < spotCount; i++) {
        const spotX = (Math.random() - 0.5) * bodyWidth * 1.5;
        const spotY = (Math.random() - 0.5) * bodyHeight * 1.2;
        const spotSize = Math.random() * 15 + 5;
        ctx.beginPath();
        ctx.arc(spotX, spotY, spotSize, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Random bumps on back
      ctx.fillStyle = getRandomColor();
      ctx.globalAlpha = 0.7;
      const bumpCount = Math.floor(Math.random() * 8) + 3;
      for (let i = 0; i < bumpCount; i++) {
        const bumpX = (Math.random() - 0.5) * bodyWidth * 1.4;
        const bumpY = (Math.random() - 0.5) * bodyHeight * 0.9 - bodyHeight * 0.3;
        const bumpSize = Math.random() * 10 + 4;
        ctx.beginPath();
        ctx.arc(bumpX, bumpY, bumpSize, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.restore();
    }

    function drawFrogLeg(startX, startY, length, thickness, color, legType) {
      ctx.save();
      ctx.translate(startX, startY);

      if (legType === 'back') {
        // Back legs have more realistic bending (crouched position)
        const bendAngle = Math.random() * 0.6 + 0.4; // More pronounced bend
        const thighLength = length * 0.5;
        const calfLength = length * 0.4;

        // Thigh segment (upper leg)
        ctx.fillStyle = color;
        ctx.fillRect(-thickness / 2, 0, thickness, thighLength);

        // Bend at knee
        ctx.translate(0, thighLength);
        ctx.rotate(bendAngle);

        // Calf segment (lower leg) - webbed foot
        ctx.fillStyle = getRandomColor();
        ctx.fillRect(-thickness / 2, 0, thickness * 0.8, calfLength);

        // Webbed foot at the end
        ctx.translate(0, calfLength);
        const footSize = thickness * 2;
        ctx.fillStyle = getRandomColor();
        ctx.beginPath();
        ctx.ellipse(0, 0, footSize * 1.5, footSize, 0, 0, Math.PI * 2);
        ctx.fill();

        // Toes with webbing
        const toeCount = 5;
        const toeColor = getContrastColor(color);
        ctx.fillStyle = toeColor;
        for (let i = 0; i < toeCount; i++) {
          const toeAngle = (i / (toeCount - 1)) * Math.PI - Math.PI / 2;
          const toeX = Math.cos(toeAngle) * footSize * 1.3;
          const toeY = Math.sin(toeAngle) * footSize * 0.8;
          ctx.beginPath();
          ctx.arc(toeX, toeY, footSize * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        // Front legs - slightly bent for a more natural posture
        const bendAngle = Math.random() * 0.3 + 0.1;
        const segmentLength = length * 0.5;

        // Upper arm
        ctx.fillStyle = color;
        ctx.fillRect(-thickness / 2, 0, thickness, segmentLength);

        // Bend at elbow
        ctx.translate(0, segmentLength);
        ctx.rotate(bendAngle);

        // Forearm
        ctx.fillStyle = getRandomColor();
        ctx.fillRect(-thickness / 2, 0, thickness * 0.7, segmentLength);

        // Hand/foot
        ctx.translate(0, segmentLength);
        const footSize = thickness * 1.2;
        ctx.fillStyle = getRandomColor();
        ctx.beginPath();
        ctx.ellipse(0, 0, footSize, footSize * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();

        // Toes
        const toeCount = 4;
        const toeColor = getContrastColor(color);
        ctx.fillStyle = toeColor;
        for (let i = 0; i < toeCount; i++) {
          const toeX = -footSize * 0.5 + (i * footSize * 0.35);
          const toeY = footSize * 0.4;
          ctx.beginPath();
          ctx.arc(toeX, toeY, footSize * 0.25, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.restore();
    }

    function drawEye(x, y, size, pupilColor, whiteColor) {
      // Eye white
      ctx.fillStyle = whiteColor;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();

      // Eye bulge (3D effect)
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.beginPath();
      ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.5, 0, Math.PI * 2);
      ctx.fill();

      // Pupil
      const pupilX = x + (Math.random() - 0.5) * size * 0.3;
      const pupilY = y + (Math.random() - 0.5) * size * 0.3;
      const pupilSize = size * 0.5;

      ctx.fillStyle = pupilColor;
      ctx.beginPath();
      ctx.arc(pupilX, pupilY, pupilSize, 0, Math.PI * 2);
      ctx.fill();

      // Eye shine
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(pupilX - pupilSize * 0.4, pupilY - pupilSize * 0.4, pupilSize * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Eye outline
      ctx.strokeStyle = pupilColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawRandomFrog() {
      drawFrog();
    }

    // Draw a random frog on page load
    window.addEventListener('load', drawRandomFrog);
  </script>
</body>
</html>
