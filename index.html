<html>
<head>
  <title>makea.frog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%);
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 20px;
      font-family: 'Arial Black', Arial, sans-serif;
      min-height: 100vh;
    }
    canvas {
      border: 3px solid #4a9d5f;
      display: block;
      margin: 20px auto;
      background: linear-gradient(to bottom, #87ceeb 0%, #b8e0d2 100%);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #4a9d5f;
      color: #ffffff;
      border: 2px solid #2d5a3d;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    button:hover {
      background-color: #5dbd75;
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.95);
    }
    h1 {
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2.5em;
      margin: 10px 0;
    }
    p {
      font-size: 1.1em;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <h1>🐸 makea.frog 🐸</h1>
  <p>Every refresh creates a unique frog. Click the button to generate a new one!</p>
  <canvas id="frogCanvas" width="700" height="500"></canvas>
  <br>
  <button onclick="drawRandomFrog()">Generate New Frog</button>

  <script>
    const canvas = document.getElementById('frogCanvas');
    const ctx = canvas.getContext('2d');

    const bodyColors = [
      '#2ecc71', '#27ae60', '#16a085', '#1abc9c', '#3498db',
      '#8e44ad', '#c0392b', '#e67e22', '#f39c12', '#f1c40f',
      '#52be80', '#1e8449', '#d68910', '#7d3c98', '#28b463'
    ];

    function getRandomColor() {
      return bodyColors[Math.floor(Math.random() * bodyColors.length)];
    }

    function drawTriangle(x, y, size, angle) {
      // Draw an equilateral triangle pointing in direction of angle
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(-size * 0.866, size * 0.5);
      ctx.lineTo(size * 0.866, size * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawFrog() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      // Random frog proportions
      const bodyScale = Math.random() * 0.5 + 0.8; // 0.8 - 1.3
      const headScale = Math.random() * 0.4 + 0.8; // 0.8 - 1.2
      
      // Body dimensions
      const bodyWidth = 100 * bodyScale;
      const bodyHeight = 130 * bodyScale;
      
      // Head dimensions
      const headRadius = 50 * headScale;
      
      // Colors
      const bodyColor = getRandomColor();
      const bellyColor = getRandomColor();
      const spotColor = getRandomColor();

      ctx.save();
      ctx.translate(centerX, centerY);

      // === BODY ===
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 30, bodyWidth, bodyHeight, 0, 0, Math.PI * 2);
      ctx.fill();

      // === BELLY SPOT (big spot on stomach) ===
      ctx.fillStyle = bellyColor;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, 35, bodyWidth * 0.5, bodyHeight * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // === BACK LEGS ===
      // Left back leg
      const backLegLength = Math.random() * 40 + 70;
      const backLegX = -bodyWidth * 0.65;
      const backLegY = bodyHeight * 0.8;
      const backLegAngle1 = Math.random() * 0.4 + 0.3;
      ctx.fillStyle = getRandomColor();
      drawTriangle(backLegX, backLegY, backLegLength * 0.35, Math.PI / 2 + backLegAngle1);

      // Right back leg
      const backLegX2 = bodyWidth * 0.65;
      const backLegAngle2 = Math.random() * 0.4 + 0.3;
      ctx.fillStyle = getRandomColor();
      drawTriangle(backLegX2, backLegY, backLegLength * 0.35, Math.PI / 2 - backLegAngle2);

      // === FRONT LEGS ===
      // Left front leg
      const frontLegLength = Math.random() * 30 + 40;
      const frontLegX = -bodyWidth * 0.7;
      const frontLegY = bodyHeight * 0.2;
      const frontLegAngle1 = Math.random() * 0.3 - 0.15;
      ctx.fillStyle = getRandomColor();
      drawTriangle(frontLegX, frontLegY, frontLegLength * 0.3, -Math.PI / 2 + frontLegAngle1);

      // Right front leg
      const frontLegX2 = bodyWidth * 0.7;
      const frontLegAngle2 = Math.random() * 0.3 - 0.15;
      ctx.fillStyle = getRandomColor();
      drawTriangle(frontLegX2, frontLegY, frontLegLength * 0.3, -Math.PI / 2 - frontLegAngle2);

      // === HEAD ===
      const headY = -bodyHeight * 0.6;
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(0, headY, headRadius, 0, Math.PI * 2);
      ctx.fill();

      // === BUMPS ON TOP OF HEAD (where eyes sit) ===
      const bumpRadius = headRadius * 0.35;
      const bumpDistance = headRadius * 0.5;

      // Left bump
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(-bumpDistance, headY - headRadius * 0.4, bumpRadius, 0, Math.PI * 2);
      ctx.fill();

      // Right bump
      ctx.beginPath();
      ctx.arc(bumpDistance, headY - headRadius * 0.4, bumpRadius, 0, Math.PI * 2);
      ctx.fill();

      // === EYES (white circles on bumps with black pupils) ===
      const eyeRadius = bumpRadius * 0.7;
      const eyeY = headY - headRadius * 0.4;

      // Left eye white
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(-bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();

      // Left eye pupil (random position within eye for life-like look)
      ctx.fillStyle = '#000000';
      const leftPupilX = -bumpDistance + (Math.random() - 0.5) * eyeRadius * 0.4;
      const leftPupilY = eyeY + (Math.random() - 0.5) * eyeRadius * 0.4;
      const pupilRadius = eyeRadius * 0.5;
      ctx.beginPath();
      ctx.arc(leftPupilX, leftPupilY, pupilRadius, 0, Math.PI * 2);
      ctx.fill();

      // Right eye white
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(bumpDistance, eyeY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();

      // Right eye pupil
      ctx.fillStyle = '#000000';
      const rightPupilX = bumpDistance + (Math.random() - 0.5) * eyeRadius * 0.4;
      const rightPupilY = eyeY + (Math.random() - 0.5) * eyeRadius * 0.4;
      ctx.beginPath();
      ctx.arc(rightPupilX, rightPupilY, pupilRadius, 0, Math.PI * 2);
      ctx.fill();

      // === MOUTH ===
      const mouthType = Math.floor(Math.random() * 3);
      const mouthY = headY + headRadius * 0.3;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';

      if (mouthType === 0) {
        // Happy smile
        ctx.beginPath();
        ctx.arc(0, mouthY, 15, 0, Math.PI, false);
        ctx.stroke();
      } else if (mouthType === 1) {
        // Straight line
        ctx.beginPath();
        ctx.moveTo(-15, mouthY);
        ctx.lineTo(15, mouthY);
        ctx.stroke();
      } else {
        // Surprised O
        ctx.beginPath();
        ctx.arc(0, mouthY, 10, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawRandomFrog() {
      drawFrog();
    }

    // Draw a random frog on page load
    window.addEventListener('load', drawRandomFrog);
  </script>
</body>
</html>
